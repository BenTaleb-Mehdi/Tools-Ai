<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#0c0a09" />
    </linearGradient>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g stroke="#292524" stroke-width="1">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" />
    </pattern>
    <rect width="800" height="500" fill="url(#grid)" />
  </g>

  <!-- Left: Mockup UI Card for SEO Tool -->
  <g transform="translate(80, 100)">
    <rect width="280" height="300" rx="16" fill="#292524" stroke="#44403c" stroke-width="2" />
    <rect width="280" height="48" rx="16" fill="#1c1917" />
    <!-- Dots -->
    <circle cx="24" cy="24" r="6" fill="#ef4444" />
    <circle cx="44" cy="24" r="6" fill="#eab308" />
    <circle cx="64" cy="24" r="6" fill="#22c55e" />
    <text x="96" y="29" font-family="sans-serif" font-size="12" font-weight="600" fill="#a8a29e">Etsy Keywords AI</text>
    
    <!-- Chart bars -->
    <rect x="30" y="80" width="220" height="24" rx="6" fill="#1c1917" />
    <rect x="40" y="88" width="80" height="8" rx="4" fill="#a8a29e" />
    <rect x="190" y="88" width="50" height="8" rx="4" fill="#22c55e" />

    <rect x="30" y="116" width="220" height="24" rx="6" fill="#1c1917" />
    <rect x="40" y="124" width="110" height="8" rx="4" fill="#a8a29e" />
    <rect x="190" y="124" width="50" height="8" rx="4" fill="#22c55e" />

    <rect x="30" y="152" width="220" height="24" rx="6" fill="#1c1917" />
    <rect x="40" y="160" width="60" height="8" rx="4" fill="#a8a29e" />
    <rect x="190" y="160" width="50" height="8" rx="4" fill="#ef4444" />

    <!-- Visual Spark/Glow -->
    <path d="M 140,240 L 145,255 L 160,260 L 145,265 L 140,280 L 135,265 L 120,260 L 135,255 Z" fill="url(#primary-grad)" />
  </g>

  <!-- Right: Mockup Card for Image Editor -->
  <g transform="translate(420, 150)">
    <rect width="300" height="220" rx="16" fill="#1c1917" stroke="#f97316" stroke-width="2" stroke-opacity="0.6" />
    <rect width="300" height="40" rx="16" fill="#292524" />
    <circle cx="20" cy="20" r="5" fill="#f97316" />
    <text x="38" y="24" font-family="sans-serif" font-size="12" font-weight="600" fill="#f97316">Photoroom AI BG</text>
    
    <!-- Staged product mockup circle inside -->
    <circle cx="150" cy="130" r="60" fill="#292524" />
    <!-- Sparkles -->
    <path d="M 150,110 L 153,120 L 163,123 L 153,126 L 150,136 L 147,126 L 137,123 L 147,120 Z" fill="#ffffff" />
    <path d="M 180,90 L 182,97 L 189,99 L 182,101 L 180,108 L 178,101 L 171,99 L 178,97 Z" fill="url(#primary-grad)" />
  </g>

  <!-- Centered Highlight Badge -->
  <g transform="translate(340, 220)">
    <circle cx="60" cy="60" r="45" fill="url(#primary-grad)" />
    <text x="60" y="66" font-family="sans-serif" font-size="20" font-weight="900" fill="#ffffff" text-anchor="middle">AI</text>
  </g>
</svg>
