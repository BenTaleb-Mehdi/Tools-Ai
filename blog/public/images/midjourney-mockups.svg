<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#030712" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg-grad)" />

  <!-- Dots grid pattern -->
  <g fill="#1f2937">
    <circle cx="20" cy="20" r="1.5" />
    <circle cx="60" cy="20" r="1.5" />
    <circle cx="100" cy="20" r="1.5" />
    <circle cx="140" cy="20" r="1.5" />
    <!-- Repeating coordinates for background aesthetic -->
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#1f2937" />
    </pattern>
    <rect width="800" height="500" fill="url(#dots)" />
  </g>

  <!-- Left Side: Staged Mockup T-Shirt and Frame -->
  <g transform="translate(100, 100)">
    <!-- Photo Frame Mockup -->
    <rect width="240" height="300" rx="8" fill="#1f2937" stroke="#374151" stroke-width="2" />
    <!-- Frame Inner border -->
    <rect x="20" y="20" width="200" height="260" rx="4" fill="#111827" />
    <!-- Visual Image inside -->
    <circle cx="120" cy="130" r="40" fill="url(#purple-grad)" fill-opacity="0.2" />
    <polygon points="120,105 130,125 150,130 130,135 120,155 110,135 90,130 110,125" fill="url(#purple-grad)" />
    <!-- Empty frame text -->
    <text x="120" y="220" font-family="sans-serif" font-size="12" font-weight="600" fill="#4b5563" text-anchor="middle">MIDJOURNEY MOCKUP</text>
  </g>

  <!-- Right Side: Prompt UI Card -->
  <g transform="translate(420, 120)">
    <rect width="280" height="240" rx="12" fill="#1f2937" stroke="#374151" stroke-width="2" />
    <rect width="280" height="40" rx="12" fill="#111827" />
    <!-- Dots -->
    <circle cx="20" cy="20" r="5" fill="#ef4444" />
    <circle cx="36" cy="20" r="5" fill="#eab308" />
    <circle cx="52" cy="20" r="5" fill="#22c55e" />
    <text x="80" y="25" font-family="sans-serif" font-size="12" font-weight="600" fill="#9ca3af">Discord Prompt</text>
    
    <!-- Code block mock lines -->
    <rect x="20" y="70" width="240" height="12" rx="4" fill="#111827" />
    <rect x="28" y="74" width="200" height="4" rx="2" fill="#f97316" />

    <rect x="20" y="94" width="240" height="12" rx="4" fill="#111827" />
    <rect x="28" y="98" width="160" height="4" rx="2" fill="#9ca3af" />

    <rect x="20" y="118" width="240" height="40" rx="4" fill="#111827" />
    <!-- Parameter Tags inside code block -->
    <rect x="28" y="126" width="60" height="24" rx="4" fill="#374151" />
    <text x="58" y="142" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">--ar 4:3</text>
    <rect x="94" y="126" width="60" height="24" rx="4" fill="#374151" />
    <text x="124" y="142" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">--v 6.0</text>
  </g>
</svg>
